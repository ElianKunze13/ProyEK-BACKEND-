
spring.application.name=portofolioEK

# ==============================================
# CONFIGURACIėN DE BASE DE DATOS (PostgreSQL)
# ==============================================
# Render no tiene PostgreSQL nativo, usa PostgreSQL externo (Clever Cloud, Aiven, etc.)
# Si usas PostgreSQL en Render, cambia los valores abajo.
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Dialecto de Hibernate para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.format_sql=false

# ==============================================
# SEGURIDAD Y JWT
# ==============================================
# Prefer setting via environment variable (JWT_SECRET). Default kept for local dev:
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ==============================================
# CONFIGURACIėN DE EMAIL (Gmail)
# ==============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.main.allow-circular-references=true

# Email del due±o del portfolio
portfolio.owner.email=${OWNER_EMAIL:EliKunze.13@gmail.com}

# ==============================================
# CONFIGURACIėN DE PUERTO PARA LA NUBE
# ==============================================
server.port=${PORT:8080}