spring.application.name=portofolioEK

# Datos de conexi�n con la base de datos MySQL
#spring.datasource.url=jdbc:mysql://localhost:3306/portofolioEK?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=root
#spring.jpa.show-sql=true
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/portofolioEK}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

#spring.main.allow-bean-definition-overriding=true //permite traer 2 beans con mismo nombre
#(no se uso, pero si se modifico en POM version de springboot a original)

spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create-drop


//clave para token JWT y tiempo de expiracion debe ser minimo de 32 bytes()
//se define en variables de entorno para no exponerla en el repositorio
# Prefer setting via environment variable (JWT_SECRET). Default kept for local dev:
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000



# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
##usando contrase�a de aplicacion creada para unico uso
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.main.allow-circular-references=true

# Email del due�o del portfolio
portfolio.owner.email=${OWNER_MAIL}

# Puerto para despliegue en la nube (Railway/Render asigna variable PORT)
server.port=${PORT:8080}